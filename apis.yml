aid: cubefs
name: CubeFS
description: >-
  CubeFS is a CNCF graduated cloud-native distributed file system that
  supports multiple access protocols including POSIX, HDFS, and S3-compatible
  object storage. It provides multi-tenancy, multi-AZ deployment, and
  cross-region replication for large-scale storage needs. CubeFS is designed
  for both hot and cold data tiers with erasure coding support.
url: https://cubefs.io
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Storage
- Distributed File System
- S3 Compatible
- Kubernetes
- Cloud Native
- Graduated
created: '2026-03-16'
modified: '2026-03-18'
specificationVersion: '0.19'
type: Index
apis:
- aid: cubefs:cubefs-s3-api
  name: CubeFS S3-Compatible API
  description: >-
    CubeFS provides an S3-compatible object storage interface through its
    ObjectNode component. This allows applications using AWS S3 SDKs to
    interact with CubeFS storage without modification, supporting standard
    S3 operations including bucket management, object CRUD, multipart
    uploads, and access control.
  humanURL: https://cubefs.io/docs/master/user-guide/objectnode.html
  properties:
  - type: Documentation
    url: https://cubefs.io/docs/master/user-guide/objectnode.html
  - type: GitHubRepository
    url: https://github.com/cubefs/cubefs
  - type: OpenAPI
    url: openapi/cubefs-s3-api-openapi.yml
  tags:
  - S3
  - Object Storage
  - Compatible API
- aid: cubefs:cubefs-master-api
  name: CubeFS Master API
  description: >-
    The CubeFS Master API provides HTTP endpoints for cluster management
    including volume creation and deletion, data partition management,
    metadata partition management, node management, and cluster status
    monitoring. It serves as the control plane interface for administering
    CubeFS clusters.
  humanURL: https://cubefs.io/docs/master/dev-guide/master-api.html
  properties:
  - type: Documentation
    url: https://cubefs.io/docs/master/dev-guide/master-api.html
